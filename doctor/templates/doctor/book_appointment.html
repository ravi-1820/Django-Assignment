{% extends 'doctor/base.html' %}

{% block title %}Book Appointment{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm border-0 rounded-4 mt-4">
            <div class="card-body p-5">
                <h3 class="mb-4 text-center">Book Appointment with Dr. {{ doctor.name }}</h3>
                <p class="text-muted text-center mb-4"><i class="bi bi-briefcase-fill me-2"></i>{{ doctor.specialty }} &nbsp;|&nbsp; <i class="bi bi-geo-alt-fill me-2"></i>{{ doctor.location }}</p>
                
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="date" class="form-label fw-semibold">Select Date</label>
                        <input type="date" class="form-control form-control-lg" id="date" name="date" required>
                    </div>
                    <div class="mb-4">
                        <label for="time" class="form-label fw-semibold">Select Time</label>
                        <input type="time" class="form-control form-control-lg" id="time" name="time" required>
                    </div>
                    
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary btn-lg fw-bold rounded-3">Confirm Booking</button>
                        <a href="{% url 'profile' %}" class="btn btn-outline-secondary rounded-3">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
