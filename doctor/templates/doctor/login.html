{% extends 'doctor/base.html' %}
{% load static %}

{% block title %}Doctor Finder - Login{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow-sm border-0 rounded-4 mt-4">
            <div class="card-body p-5">
                <h2 class="text-center mb-4 fw-bold text-primary">Welcome Back</h2>
                
                <form method="post">
                    {% csrf_token %}
                    
                    {% if form.non_field_errors %}
                        <div class="alert alert-danger">
                            {{ form.non_field_errors }}
                        </div>
                    {% endif %}

                    <div class="mb-3">
                        <label for="{{ form.username.id_for_label }}" class="form-label fw-semibold">Username</label>
                        <input type="text" name="{{ form.username.name }}" id="{{ form.username.id_for_label }}" class="form-control form-control-lg" required>
                    </div>
                    
                    <div class="mb-4">
                        <label for="{{ form.password.id_for_label }}" class="form-label fw-semibold">Password</label>
                        <input type="password" name="{{ form.password.name }}" id="{{ form.password.id_for_label }}" class="form-control form-control-lg" required>
                    </div>

                    <button type="submit" class="btn btn-primary w-100 btn-lg rounded-3 fw-bold">Login</button>
                    <input type="hidden" name="next" value="{{ next }}">
                </form>

                <div class="text-center mt-4">
                    <p class="text-muted">Don't have an account? <a href="{% url 'register' %}" class="text-decoration-none fw-semibold">Register here</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
